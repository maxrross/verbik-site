<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Verbik purple gradient background">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16005f"/>
      <stop offset="0.48" stop-color="#5a00f5"/>
      <stop offset="1" stop-color="#ff4c1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#b799ff" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#5a00f5" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#24008f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="0.9" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#ffb25c" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ff4c1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#base)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" fill="url(#warm)"/>
</svg>
